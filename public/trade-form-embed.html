<!-- Camera West — Trade // Sell Form (Shopify Liquid Embed)
     Paste this entire block into a custom Liquid section/block. -->

<iframe
  id="cw-trade-in-frame"
  src="https://cw-tradein-app.pages.dev/trade-form.html"
  style="width:100%;border:none;min-height:1200px;display:block;"
  scrolling="no"
  allowtransparency="true"
  title="Camera West Trade-In Form"
></iframe>

<script>
  window.addEventListener('message', function(e) {
    if (e.data && e.data.cwTradeInHeight) {
      document.getElementById('cw-trade-in-frame').style.height = e.data.cwTradeInHeight + 'px';
    }
  });
</script>
