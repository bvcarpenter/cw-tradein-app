<!-- Camera West – Trade-In / Sell trigger (Product page Custom Liquid block) -->
<!-- Paste this into a Custom Liquid block inside the Product information section -->

{% if customer %}
<script>
  window.__cwCustomer = {
    firstName: {{ customer.first_name | json }},
    lastName:  {{ customer.last_name | json }},
    email:     {{ customer.email | json }},
    phone:     {{ customer.phone | json }}
  };
</script>
{% endif %}

<button id="cw-trade-trigger" type="button" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px 20px;background:transparent;border:1px solid #333;cursor:pointer;font-family:inherit;font-size:16px;font-weight:400;letter-spacing:0.1em;color:#333;text-align:center;line-height:1.4;" onmouseover="this.style.background='#333';this.style.color='#fff'" onmouseout="this.style.background='transparent';this.style.color='#333'"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg> Trade-In / Sell Your Gear</button>

<script src="https://cw-tradein-app.ben-d91.workers.dev/trade-form-modal.js"></script>
