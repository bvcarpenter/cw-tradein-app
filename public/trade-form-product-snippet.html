<!-- Camera West – Trade-In / Sell trigger (Product page Custom Liquid block) -->
<!-- Paste this into a Custom Liquid block inside the Product information section -->

{% if customer %}
<script>
  window.__cwCustomer = {
    firstName: {{ customer.first_name | json }},
    lastName:  {{ customer.last_name | json }},
    email:     {{ customer.email | json }},
    phone:     {{ customer.phone | json }}
  };
</script>
{% endif %}

<style>
  #cw-trade-trigger {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 14px 20px;
    background: none;
    border: 1px solid #c8c4be;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #111;
    transition: border-color .15s, background .15s;
    text-align: left;
    line-height: 1.3;
  }
  #cw-trade-trigger:hover {
    border-color: #111;
    background: #f8f7f5;
  }
  #cw-trade-trigger svg {
    flex-shrink: 0;
    opacity: .7;
  }
  #cw-trade-trigger .cw-trigger-text span {
    display: block;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: none;
    color: #666;
    margin-top: 2px;
  }
</style>

<button id="cw-trade-trigger" type="button">
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
  <span class="cw-trigger-text">
    Trade-In / Sell Your Gear
    <span>Get a quote &mdash; fast &amp; easy</span>
  </span>
</button>

<script src="https://cw-tradein-app.ben-d91.workers.dev/trade-form-modal.js"></script>
