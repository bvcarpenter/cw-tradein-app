<!-- Camera West – Trade-In / Sell trigger (Product page Custom Liquid block) -->
<!-- Paste this into a Custom Liquid block inside the Product information section -->

{% if customer %}
<script>
  window.__cwCustomer = {
    firstName: {{ customer.first_name | json }},
    lastName:  {{ customer.last_name | json }},
    email:     {{ customer.email | json }},
    phone:     {{ customer.phone | json }}
  };
</script>
{% endif %}

<button id="cw-trade-trigger" type="button" style="display:block;width:100%;padding:16px 20px;background:#333;border:1px solid #333;cursor:pointer;font-family:inherit;font-size:16px;font-weight:400;letter-spacing:0.1em;color:#fff;text-align:center;line-height:1.4;" onmouseover="this.style.background='#000';this.style.borderColor='#000'" onmouseout="this.style.background='#333';this.style.borderColor='#333'">Trade-In / Sell Your Gear</button>

<script src="https://cw-tradein-app.ben-d91.workers.dev/trade-form-modal.js"></script>
