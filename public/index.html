<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sign In — Camera West Trade-In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e0e;
      --white:   #f5f5f0;
      --accent:  #d95e00;
      --dim:     rgba(245,245,240,0.45);
      --border:  rgba(245,245,240,0.1);
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .box {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      margin-bottom: 48px;
    }

    .divider {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .sub {
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 0.06em;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
    }

    input[type="email"] {
      width: 100%;
      background: #141414;
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 300;
      padding: 13px 16px;
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
      border-radius: 0;
    }

    input[type="email"]:focus {
      border-color: var(--accent);
    }

    input[type="email"]::placeholder {
      color: rgba(245,245,240,0.25);
    }

    .btn {
      width: 100%;
      background: var(--white);
      color: var(--bg);
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 15px 24px;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: 8px;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .msg {
      margin-top: 24px;
      padding: 14px 18px;
      font-size: 12px;
      line-height: 1.7;
      letter-spacing: 0.04em;
      display: none;
    }

    .msg.success {
      background: rgba(217,94,0,0.08);
      border: 1px solid rgba(217,94,0,0.25);
      color: var(--white);
      display: block;
    }

    .msg.error {
      background: rgba(180,60,60,0.1);
      border: 1px solid rgba(180,60,60,0.3);
      color: #e08080;
      display: block;
    }

    .footer {
      margin-top: 48px;
      font-size: 10px;
      color: rgba(245,245,240,0.2);
      letter-spacing: 0.08em;
    }

    /* Error states from redirect */
    .url-error {
      margin-bottom: 24px;
      padding: 12px 16px;
      background: rgba(180,60,60,0.1);
      border: 1px solid rgba(180,60,60,0.3);
      color: #e08080;
      font-size: 11px;
      letter-spacing: 0.04em;
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">

    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 75" height="24" style="display:block;margin:0 auto;">
        <path fill="#fff" d="M27.4,43c-.2,3.6-1.2,6.3-3.1,8.2s-4.5,2.8-7.9,2.8-6.3-1.2-8.3-3.5c-1.9-2.4-2.9-5.7-2.9-10.1v-5.3c0-4.4,1-7.7,3-10.1,2-2.4,4.7-3.5,8.2-3.5s6.1,1,7.9,2.9,2.8,4.7,3.1,8.3h-6.4c0-2.2-.4-3.8-1-4.6-.6-.8-1.8-1.3-3.5-1.3s-2.9.6-3.6,1.8c-.7,1.2-1.1,3.2-1.1,5.9v6c0,3.2.4,5.3,1.1,6.5.7,1.2,1.9,1.8,3.6,1.8s2.8-.4,3.5-1.2c.6-.8,1-2.3,1.1-4.5h6.4-.1Z"/>
        <path fill="#fff" d="M49.8,47.1h-8.7l-1.7,6.5h-6.8l9.9-31.7h5.9l10,31.7h-6.8l-1.7-6.5h0ZM42.5,41.8h5.9l-3-11.3-3,11.3h0Z"/>
        <path fill="#fff" d="M73,21.9l6,22.9,6-22.9h8.4v31.7h-6.4v-8.6l.6-13.2-6.3,21.8h-4.4l-6.3-21.8.6,13.2v8.6h-6.4v-31.7h8.4-.2Z"/>
        <path fill="#fff" d="M118.2,39.9h-10v8.4h11.8v5.3h-18.2v-31.7h18.2v5.3h-11.8v7.5h10v5.2Z"/>
        <path fill="#fff" d="M136.6,42h-3.2v11.6h-6.4v-31.7h10.2c3.2,0,5.7.8,7.4,2.5,1.8,1.7,2.6,4,2.6,7.1s-1.5,7.2-4.6,8.9l5.5,13v.3h-6.9l-4.8-11.6h.2ZM133.4,36.7h3.6c1.3,0,2.2-.4,2.9-1.3.6-.8,1-2,1-3.4,0-3.2-1.2-4.8-3.7-4.8h-3.7v9.4h-.1Z"/>
        <path fill="#fff" d="M170.2,47.1h-8.7l-1.7,6.5h-6.8l9.9-31.7h5.9l10,31.7h-6.8l-1.7-6.5h0ZM162.8,41.8h5.9l-3-11.3-3,11.3h.1Z"/>
        <path fill="#fff" d="M205.6,41.8l3-19.9h6.3l-5.6,31.7h-6.4l-3.7-18.7-3.7,18.7h-6.4l-5.7-31.7h6.4l3,19.9,3.7-19.9h5.4s3.7,19.9,3.7,19.9Z"/>
        <path fill="#fff" d="M238.1,39.9h-10v8.4h11.8v5.3h-18.2v-31.7h18.2v5.3h-11.8v7.5h10v5.2Z"/>
        <path fill="#fff" d="M260.3,45.3c0-1.3-.3-2.3-1-2.9-.7-.7-1.9-1.4-3.6-2.1-3.2-1.2-5.5-2.6-6.9-4.2s-2.1-3.5-2.1-5.8.9-4.8,2.8-6.4c1.9-1.6,4.3-2.4,7.2-2.4s3.7.4,5.2,1.2,2.7,2,3.5,3.5,1.2,3.2,1.2,5.1h-6.4c0-1.5-.3-2.6-1-3.4-.6-.8-1.5-1.2-2.7-1.2s-2,.3-2.6,1-.9,1.5-.9,2.6.3,1.7,1,2.4c.7.7,1.9,1.4,3.7,2.2,3.1,1.1,5.3,2.5,6.7,4.1,1.4,1.6,2.1,3.7,2.1,6.2s-.9,4.9-2.6,6.5c-1.8,1.6-4.1,2.3-7.1,2.3s-3.9-.4-5.6-1.3c-1.7-.8-3-2.1-4-3.6-.9-1.6-1.4-3.4-1.4-5.6h6.4c0,1.8.4,3.2,1.1,4,.7.8,1.9,1.2,3.5,1.2s3.4-1.2,3.4-3.5h0Z"/>
        <path fill="#fff" d="M294.9,27.2h-7.9v26.4h-6.4v-26.4h-7.7v-5.3h22v5.3Z"/>
      </svg>
    </div>

    <div class="divider">Staff Access</div>
    <h1>Trade-In Manager</h1>
    <p class="sub">Enter your Camera West email address.<br>We'll send you a sign-in link.</p>

    <div class="url-error" id="url-error"></div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@camerawest.com" autocomplete="email" autofocus>
    </div>

    <button class="btn" id="submit-btn" onclick="requestLink()">Send Sign-In Link</button>

    <div class="msg" id="msg"></div>

    <div class="footer">Camera West &mdash; Internal Use Only</div>
  </div>

  <script>
    // Show URL error messages (from failed verify redirects)
    const params = new URLSearchParams(window.location.search);
    const errorMap = {
      invalid_or_expired: 'That sign-in link is invalid or has already been used. Request a new one.',
      expired: 'That sign-in link has expired (links are valid for 15 minutes). Request a new one.',
      missing_token: 'Invalid sign-in link. Please request a new one.',
      server_error: 'Something went wrong. Please try again.',
    };
    const urlError = params.get('error');
    if (urlError && errorMap[urlError]) {
      const el = document.getElementById('url-error');
      el.textContent = errorMap[urlError];
      el.style.display = 'block';
    }

    // If already authenticated, redirect to app
    fetch('/api/auth/session')
      .then(r => r.json())
      .then(d => { if (d.authenticated) window.location.href = '/app'; })
      .catch(() => {});

    async function requestLink() {
      const email = document.getElementById('email').value.trim();
      const btn   = document.getElementById('submit-btn');
      const msg   = document.getElementById('msg');

      if (!email || !email.includes('@')) {
        msg.className = 'msg error';
        msg.textContent = 'Please enter a valid email address.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';
      msg.className = 'msg';

      try {
        const res  = await fetch('/api/auth/request', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email }),
        });
        const data = await res.json();

        msg.className   = 'msg success';
        msg.textContent = 'Check your email — a sign-in link is on its way. You can close this tab.';
        btn.textContent = 'Link Sent';

      } catch (err) {
        msg.className   = 'msg error';
        msg.textContent = 'Could not send email. Please try again.';
        btn.disabled    = false;
        btn.textContent = 'Send Sign-In Link';
      }
    }

    // Allow Enter key to submit
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') requestLink();
    });
  </script>
</body>
</html>
