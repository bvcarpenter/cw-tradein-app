<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sign In — Trade // Sell — Camera West</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Palatino+Linotype&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:Jost,sans-serif;
  background:#0e0e0e;
  color:#f5f5f0;
  font-size:15px;
  font-weight:300;
  letter-spacing:.025em;
  -webkit-font-smoothing:antialiased;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.login-card{
  width:100%;
  max-width:400px;
  text-align:center;
}

.logo{margin-bottom:40px}
.logo svg{display:inline-block}

.divider{
  font-family:"Palatino Linotype","Palatino","Book Antiqua",Georgia,serif;
  font-size:20px;
  font-weight:300;
  font-style:italic;
  letter-spacing:.12em;
  color:rgba(245,245,240,.45);
  margin-bottom:10px;
}

.app-name{
  font-size:11px;
  font-weight:500;
  letter-spacing:.24em;
  text-transform:uppercase;
  color:#d95e00;
  margin-bottom:48px;
}

.login-box{
  background:#141414;
  border:1px solid #2a2a2a;
  padding:36px 32px;
  text-align:left;
}

.login-box h2{
  font-family:"Palatino Linotype","Palatino","Book Antiqua",Georgia,serif;
  font-size:22px;
  font-weight:300;
  margin-bottom:6px;
}

.login-box p{
  font-size:12px;
  color:rgba(245,245,240,.55);
  letter-spacing:.04em;
  line-height:1.7;
  margin-bottom:28px;
}

.field-label{
  display:block;
  font-size:10px;
  font-weight:500;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(245,245,240,.5);
  margin-bottom:8px;
}

.email-input{
  width:100%;
  background:#1a1a1a;
  border:1px solid #2a2a2a;
  color:#f5f5f0;
  font-family:Jost,sans-serif;
  font-size:14px;
  font-weight:300;
  letter-spacing:.03em;
  padding:14px 16px;
  outline:none;
  transition:border-color .2s;
}
.email-input::placeholder{color:rgba(245,245,240,.25)}
.email-input:focus{border-color:#d95e00}

.submit-btn{
  width:100%;
  margin-top:16px;
  background:#d95e00;
  color:#fff;
  border:none;
  font-family:Jost,sans-serif;
  font-size:11px;
  font-weight:500;
  letter-spacing:.16em;
  text-transform:uppercase;
  padding:16px;
  cursor:pointer;
  transition:opacity .2s;
}
.submit-btn:hover{opacity:.85}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

.status{
  margin-top:20px;
  font-size:12px;
  letter-spacing:.04em;
  line-height:1.7;
  min-height:20px;
}
.status.success{color:#6fbf73}
.status.error{color:#e07070}

.footer{
  margin-top:48px;
  font-size:10px;
  letter-spacing:.1em;
  color:rgba(245,245,240,.25);
  text-align:center;
}
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 75" height="32">
      <path fill="#fff" d="M27.4,43c-.2,3.6-1.2,6.3-3.1,8.2s-4.5,2.8-7.9,2.8-6.3-1.2-8.3-3.5c-1.9-2.4-2.9-5.7-2.9-10.1v-5.3c0-4.4,1-7.7,3-10.1,2-2.4,4.7-3.5,8.2-3.5s6.1,1,7.9,2.9,2.8,4.7,3.1,8.3h-6.4c0-2.2-.4-3.8-1-4.6-.6-.8-1.8-1.3-3.5-1.3s-2.9.6-3.6,1.8c-.7,1.2-1.1,3.2-1.1,5.9v6c0,3.2.4,5.3,1.1,6.5.7,1.2,1.9,1.8,3.6,1.8s2.8-.4,3.5-1.2c.6-.8,1-2.3,1.1-4.5h6.4-.1Z"/>
      <path fill="#fff" d="M49.8,47.1h-8.7l-1.7,6.5h-6.8l9.9-31.7h5.9l10,31.7h-6.8l-1.7-6.5h0ZM42.5,41.8h5.9l-3-11.3-3,11.3h0Z"/>
      <path fill="#fff" d="M73,21.9l6,22.9,6-22.9h8.4v31.7h-6.4v-8.6l.6-13.2-6.3,21.8h-4.4l-6.3-21.8.6,13.2v8.6h-6.4v-31.7h8.4-.2Z"/>
      <path fill="#fff" d="M118.2,39.9h-10v8.4h11.8v5.3h-18.2v-31.7h18.2v5.3h-11.8v7.5h10v5.2Z"/>
      <path fill="#fff" d="M136.6,42h-3.2v11.6h-6.4v-31.7h10.2c3.2,0,5.7.8,7.4,2.5,1.8,1.7,2.6,4,2.6,7.1s-1.5,7.2-4.6,8.9l5.5,13v.3h-6.9l-4.8-11.6h.2ZM133.4,36.7h3.6c1.3,0,2.2-.4,2.9-1.3.6-.8,1-2,1-3.4,0-3.2-1.2-4.8-3.7-4.8h-3.7v9.4h-.1Z"/>
      <path fill="#fff" d="M170.2,47.1h-8.7l-1.7,6.5h-6.8l9.9-31.7h5.9l10,31.7h-6.8l-1.7-6.5h0ZM162.8,41.8h5.9l-3-11.3-3,11.3h.1Z"/>
      <path fill="#fff" d="M205.6,41.8l3-19.9h6.3l-5.6,31.7h-6.4l-3.7-18.7-3.7,18.7h-6.4l-5.7-31.7h6.4l3,19.9,3.7-19.9h5.4s3.7,19.9,3.7,19.9Z"/>
      <path fill="#fff" d="M238.1,39.9h-10v8.4h11.8v5.3h-18.2v-31.7h18.2v5.3h-11.8v7.5h10v5.2Z"/>
      <path fill="#fff" d="M260.3,45.3c0-1.3-.3-2.3-1-2.9-.7-.7-1.9-1.4-3.6-2.1-3.2-1.2-5.5-2.6-6.9-4.2s-2.1-3.5-2.1-5.8.9-4.8,2.8-6.4c1.9-1.6,4.3-2.4,7.2-2.4s3.7.4,5.2,1.2,2.7,2,3.5,3.5,1.2,3.2,1.2,5.1h-6.4c0-1.5-.3-2.6-1-3.4-.6-.8-1.5-1.2-2.7-1.2s-2,.3-2.6,1-.9,1.5-.9,2.6.3,1.7,1,2.4c.7.7,1.9,1.4,3.7,2.2,3.1,1.1,5.3,2.5,6.7,4.1,1.4,1.6,2.1,3.7,2.1,6.2s-.9,4.9-2.6,6.5c-1.8,1.6-4.1,2.3-7.1,2.3s-3.9-.4-5.6-1.3c-1.7-.8-3-2.1-4-3.6-.9-1.6-1.4-3.4-1.4-5.6h6.4c0,1.8.4,3.2,1.1,4,.7.8,1.9,1.2,3.5,1.2s3.4-1.2,3.4-3.5h0Z"/>
      <path fill="#fff" d="M294.9,27.2h-7.9v26.4h-6.4v-26.4h-7.7v-5.3h22v5.3Z"/>
    </svg>
  </div>

  <div class="divider">Trade // Sell</div>
  <div class="app-name">Trade-In Manager</div>

  <div class="login-box">
    <h2>Sign In</h2>
    <p>Enter your email address and we'll send you a secure link to sign in.</p>

    <label class="field-label" for="email">Email Address</label>
    <input class="email-input" id="email" type="email" placeholder="you@camerawest.com" autocomplete="email" autofocus>

    <button class="submit-btn" id="submit" onclick="requestLogin()">Send Sign-In Link</button>

    <div class="status" id="status"></div>
  </div>

  <div class="footer">Camera West &mdash; Est. 1976</div>
</div>

<script>
async function requestLogin() {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('submit');
  const status = document.getElementById('status');

  if (!email || !email.includes('@')) {
    status.className = 'status error';
    status.textContent = 'Please enter a valid email address.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending…';
  status.className = 'status';
  status.textContent = '';

  try {
    const res = await fetch('/api/auth/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();

    if (data.error) {
      status.className = 'status error';
      status.textContent = data.error;
    } else {
      status.className = 'status success';
      status.textContent = 'Check your inbox — a sign-in link has been sent.';
      btn.textContent = 'Link Sent';
      return;
    }
  } catch (e) {
    status.className = 'status error';
    status.textContent = 'Something went wrong. Please try again.';
  }

  btn.disabled = false;
  btn.textContent = 'Send Sign-In Link';
}

document.getElementById('email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') requestLogin();
});

// Show error from auth verify redirect (?error=expired, etc.)
(function() {
  const params = new URLSearchParams(window.location.search);
  const err = params.get('error');
  if (err) {
    const status = document.getElementById('status');
    const msgs = {
      missing_token: 'Invalid sign-in link.',
      invalid_or_expired: 'Sign-in link has expired or already been used.',
      expired: 'Sign-in link has expired.',
      server_error: 'Something went wrong. Please try again.',
    };
    status.className = 'status error';
    status.textContent = msgs[err] || 'Sign-in failed. Please try again.';
  }
})();

// If already authenticated, redirect to main app
(async function() {
  try {
    const res = await fetch('/api/auth/session');
    const data = await res.json();
    if (data.authenticated) {
      window.location.href = '/';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
